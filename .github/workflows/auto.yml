name: Amazon Auto Sourcing

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 핵심: 설치와 실행을 한 번에 실행하여 환경 분리를 방지합니다.
      - name: 라이브러리 설치 및 실행
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests beautifulsoup4 deep-translator pandas google-auth
          python main.py
